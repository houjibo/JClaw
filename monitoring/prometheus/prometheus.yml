global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'jclaw-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jclaw'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'jclaw-main'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'jclaw_.*'
        action: keep

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'jclaw-node'
