version: '3.8'

services:
  # PostgreSQL - 关系数据库（业务数据 + 记忆 + 追溯）
  postgres:
    image: postgres:16-alpine
    container_name: jclaw-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: jclaw
      POSTGRES_USER: jclaw
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jclaw_password}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - jclaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jclaw -d jclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # FalkorDB - 图数据库（意图图谱 + 代码追溯图谱）
  falkordb:
    image: falkordb/falkordb:edge
    container_name: jclaw-falkordb
    ports:
      - "6379:6379"
    environment:
      - FALKORDB_MAX_QUEUED_QUERIES=1000
      - FALKORDB_THREAD_COUNT=4
    volumes:
      - falkordb_data:/data
    networks:
      - jclaw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis - 缓存（记忆 L1 层/会话缓存）
  redis:
    image: redis:7-alpine
    container_name: jclaw-redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - jclaw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  jclaw-network:
    driver: bridge

volumes:
  postgres_data:
  falkordb_data:
  redis_data:
