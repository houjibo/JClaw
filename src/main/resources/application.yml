server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: JClaw
  
  # 数据源配置 (H2 内存数据库用于测试)
  datasource:
    url: jdbc:h2:mem:jclaw;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # MyBatis-Plus 配置
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    global-config:
      db-config:
        id-type: assign_id
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: com.jclaw.*.entity
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  
  # Jackson 配置
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# JClaw 配置
jclaw:
  workspace: ${user.home}/.openclaw/workspace
  max-read-size: 10485760  # 10MB
  allow-write: true
  allow-exec: true
  cache-enabled: true
  cache-expire-minutes: 10
  mcp-enabled: true
  agent-enabled: true
  streaming-timeout: 30000  # 30 秒

# Springdoc OpenAPI 配置
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# 日志配置
logging:
  level:
    root: INFO
    com.jclaw: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{requestId}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{requestId}] - %msg%n"
  file:
    name: ${user.home}/.openclaw/jclaw/logs/jclaw.log

# H2 数据库配置 (测试用)
h2:
  console:
    enabled: true

# Actuator 安全配置（生产环境应启用）
