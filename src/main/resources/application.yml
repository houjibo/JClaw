server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: JClaw
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  
  # Jackson 配置
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# JClaw 配置
jcode:
  workspace: ${user.home}/.openclaw/workspace
  max-read-size: 10485760  # 10MB
  allow-write: true
  allow-exec: true
  cache-enabled: true
  cache-expire-minutes: 10
  mcp-enabled: true
  agent-enabled: true
  streaming-timeout: 30000  # 30 秒

# Springdoc OpenAPI 配置
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# 日志配置
logging:
  level:
    root: INFO
    com.openclaw.jcode: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{requestId}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{requestId}] - %msg%n"
  file:
    name: ${user.home}/.openclaw/jcode/logs/jcode.log

# Actuator 安全配置（生产环境应启用）
# management:
#   security:
#     enabled: true
